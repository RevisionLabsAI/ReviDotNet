name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for GitHub OIDC trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Analyzers
        run: dotnet build ReviDotNet.Analyzers/ReviDotNet.Analyzers.csproj --configuration Release

      - name: Build Core
        run: dotnet build ReviDotNet.Core/ReviDotNet.Core.csproj --configuration Release

      - name: Run tests
        run: dotnet test ReviDotNet.Tests/ReviDotNet.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack ReviDotNet
        run: >
          dotnet pack ReviDotNet.Core/ReviDotNet.Core.csproj
          --configuration Release
          --no-build
          -p:PackageVersion=${{ steps.version.outputs.VERSION }}
          --output ./nupkg

      - name: Login to NuGet.org (trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

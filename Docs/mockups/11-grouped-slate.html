<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Forge · Agent Instance — Grouped / Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="grouped.css?v=2" />
<style>
  /* ── Slate: calm, neutral, quietly structured. Subtle hairline cards, desaturated palette. ── */
  .wrap { max-width: 900px; margin: 0 auto; padding: 26px 22px 110px; }

  /* status: plain coloured text + dot (no filled pill) */
  .st { background: none; padding: 0; }

  /* Header — quiet card, no gradient */
  .inst { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 20px 22px 18px; margin-bottom: 20px; }
  .inst-top { display: flex; align-items: center; gap: 13px; }
  .inst-ava { width: 42px; height: 42px; border-radius: 11px; flex: 0 0 auto; color: var(--text-2); background: var(--bg-soft); display: flex; align-items: center; justify-content: center; }
  .inst-ava svg { width: 22px; height: 22px; }
  .inst-name { font-size: 1.14rem; font-weight: 700; letter-spacing: -.015em; }
  .inst-sub { font-size: .78rem; color: var(--text-2); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 3px; }
  .inst-status { margin-left: auto; font-weight: 600; }
  .inst-task { margin-top: 15px; font-size: .9rem; line-height: 1.6; color: var(--text-2); }
  .inst-task .lbl { font-size: .64rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--text-3); margin-right: 8px; }
  .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; }
  @media (max-width: 720px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
  .tile-stat { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border: 1px solid var(--border); border-radius: var(--r-sm); background: none; }
  .tile-stat .ti { width: 30px; height: 30px; border-radius: 8px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; color: var(--text-2); background: var(--bg-soft); }
  .tile-stat .ti svg { width: 16px; height: 16px; }
  .tile-body { display: flex; flex-direction: column; line-height: 1.1; }
  .tile-stat .v { font-weight: 700; font-size: 1.05rem; letter-spacing: -.01em; }
  .tile-stat .l { font-size: .66rem; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .meters { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
  @media (max-width: 600px) { .meters { grid-template-columns: 1fr; } }
  .meter-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .meter-l { font-size: .66rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-2); }
  .meter-v { font-family: var(--font-mono); font-size: .74rem; font-weight: 600; }
  .meter-bar { height: 6px; border-radius: 999px; background: var(--bg-soft); overflow: hidden; }
  .meter-bar > span { display: block; height: 100%; background: var(--text-3); }
  .meter-bar.warn > span { background: var(--warning); }
  .meter-bar.over > span { background: var(--error); }

  /* Stream */
  .stream { display: flex; flex-direction: column; gap: 14px; }

  /* Activation — quiet bordered container, neutral header */
  .activation { border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; background: var(--surface); }
  .activation > summary { display: flex; align-items: center; gap: 10px; padding: 11px 15px; border-bottom: 1px solid var(--border); }
  .activation:not([open]) > summary { border-bottom: none; }
  .activation > summary:hover { background: var(--hover); }
  .act-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; background: var(--text-3); }
  .act--done .act-dot { background: var(--success); } .act--running .act-dot { background: var(--info); } .act--queued .act-dot { background: var(--text-3); }
  .act-state { font-weight: 700; font-size: .9rem; text-transform: capitalize; }
  .act-cycle { font-family: var(--font-mono); font-size: .72rem; color: var(--text-3); }
  .act-sp { flex: 1 1 auto; }
  .act-r { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
  .act-steps { font-size: .72rem; color: var(--text-3); }
  .act-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  /* Steps — quiet hairline cards, no stripe; status is a left dot before the number */
  .step { border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; background: var(--surface); --accent: var(--text-3); }
  .step--done { --accent: var(--success); } .step--running { --accent: var(--info); }
  .step--failed { --accent: var(--error); } .step--queued { --accent: var(--text-3); }
  .step > summary { display: flex; align-items: center; gap: 11px; padding: 12px 14px; }
  .step > summary:hover { background: var(--hover); }
  .stepno { font-family: var(--font-mono); font-weight: 600; font-size: .74rem; color: var(--text-2); flex: 0 0 auto; display: inline-flex; align-items: center; gap: 8px; }
  .stepno::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; }
  .step-h { flex: 1 1 auto; min-width: 0; }
  .step-t { font-weight: 600; font-size: .9rem; }
  .step-r { display: flex; align-items: center; gap: 11px; flex: 0 0 auto; }
  .step .body { padding: 2px 14px 14px; }
  .thinking { display: flex; gap: 8px; align-items: flex-start; margin-top: 11px; color: var(--text-2); font-size: .84rem; font-style: italic; }
  .thinking .ic { width: 15px; height: 15px; color: var(--text-3); flex: 0 0 auto; margin-top: 2px; }
  .stepmsg { margin-top: 12px; font-size: .9rem; line-height: 1.6; }

  /* Call list (≤5) — quiet hairline rows, neutral tile */
  .calllist { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .call { border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; background: none; }
  .call > summary { display: flex; align-items: center; gap: 11px; padding: 10px 12px; }
  .call > summary:hover { background: var(--hover); }
  .call .tile { width: 27px; height: 27px; border-radius: 7px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; color: var(--text-2); background: var(--bg-soft); }
  .call .tile svg { width: 14px; height: 14px; }
  .call-h { flex: 1 1 auto; min-width: 0; }
  .call-t { font-weight: 600; font-size: .86rem; display: flex; gap: 8px; align-items: center; }
  .call .kind { font-family: var(--font-mono); font-size: .76rem; color: var(--text-2); }
  .call-s { font-size: .8rem; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .call-r { display: flex; align-items: center; gap: 9px; flex: 0 0 auto; }
  .call-b { padding: 2px 12px 12px 12px; }

  /* Transition — quiet text on a hairline */
  .tmark { display: flex; align-items: center; gap: 10px; }
  .tmark .tline { flex: 1 1 auto; height: 1px; background: var(--border); }
  .tmark .sig { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: .72rem; font-weight: 600; color: var(--text-2); background: none; border: none; padding: 0; }
  .tmark .sig svg { width: 12px; height: 12px; color: var(--text-3); }

  /* Segmented badge — borderless muted counts */
  .segbadge { border: none; background: none; gap: 11px; }
  .seg { padding: 0; background: none; font-weight: 600; }
  .seg + .seg { border-left: none; }

  /* Sub-agent — quiet nested card */
  .mini { border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--bg-soft); padding: 12px; }
  .mini-h { display: flex; align-items: center; gap: 10px; padding-bottom: 11px; margin-bottom: 11px; border-bottom: 1px solid var(--border); }
  .mini-h .ava { width: 28px; height: 28px; border-radius: 8px; flex: 0 0 auto; color: var(--text-2); background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .mini-h .ava svg { width: 14px; height: 14px; }
  .mini-h .n { font-weight: 700; font-size: .86rem; }
  .mini-h .s { font-size: .76rem; color: var(--text-2); }
  .mini-stream { display: flex; flex-direction: column; gap: 8px; }
  .mini-stream .step { background: var(--surface); }

  /* Calm cubes — light-tint chips with status-coloured glyphs, no glow */
  .cubes { grid-template-columns: repeat(auto-fill, 22px); gap: 6px; }
  .cube { width: 22px; height: 22px; border-radius: 5px; }
  .cube.done { background: rgba(var(--success-rgb), .18); }
  .cube.failed { background: rgba(var(--error-rgb), .16); }
  .cube.running { background: rgba(var(--info-rgb), .16); }
  .cube.queued { background: transparent; border: 1.5px dashed var(--border-2); }
  .cube.dropped { background: var(--hover); border: 1px solid var(--border-2); }
  .cube:hover { transform: scale(1.12); box-shadow: none; }
  .cube.sel { outline: 2px solid var(--text-2); outline-offset: 2px; transform: none; }
  .cm-check { stroke: var(--success); }
  .cmark.cx::before, .cmark.cx::after { background: var(--error); }
  .cm-bars i { background: var(--info); }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html" title="Back to gallery">
    <span class="mark"><svg class="ic"><use href="#i-agent"/></svg></span>
    <span style="display:flex;flex-direction:column;line-height:1.1">
      <span class="eyebrow">Forge mockup · Grouped</span><span class="name">Slate</span>
    </span>
  </a>
  <span class="spacer"></span>
  <button class="btn btn-ghost" onclick="setAllOpen(true)"><svg class="ic"><use href="#i-expand"/></svg>Expand all</button>
  <button class="btn btn-ghost" onclick="setAllOpen(false)">Collapse all</button>
  <button class="btn" onclick="toggleTheme()"><svg class="ic"><use href="#i-theme"/></svg><span data-theme-label>Dark</span></button>
  <a class="btn" href="index.html"><svg class="ic"><use href="#i-arrow"/></svg>Gallery</a>
</div>

<div class="wrap"><div id="app"></div></div>

<script src="mockup.js?v=2"></script>
<script src="grouped-core.js?v=3"></script>
</body>
</html>
